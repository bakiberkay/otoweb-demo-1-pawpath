# Decap CMS config — generated by scripts/flatten-demo.mjs
# Edits land in src/content/editables.json on `main`; Netlify rebuilds on push.
# The build-time content shim (src/content/index.ts) merges these values into
# site.json's strings table and flips source to "authored" per ADR 0002.

backend:
  name: git-gateway
  branch: main

media_folder: public/uploads
public_folder: /uploads

collections:
  - name: site
    label: "Site content"
    files:
      - name: editables
        label: "Editable strings"
        file: src/content/editables.json
        fields:
          - { name: str_brand_name, widget: string, label: "Brand name" }
          - { name: str_brand_tagline, widget: string, label: "Brand tagline" }
          - { name: str_contact_email, widget: string, label: "Contact email" }
          - { name: str_contact_phone, widget: string, label: "Contact phone" }
          - { name: str_seo_default_title, widget: string, label: "Default page title" }
          - { name: str_seo_default_description, widget: string, label: "Default meta description" }
          - { name: str_home_hero_headline, widget: string, label: "Home hero — headline" }
          - { name: str_home_hero_subhead, widget: text, label: "Home hero — subhead" }
          - { name: str_home_hero_cta_primary, widget: string, label: "Home hero — primary CTA label" }
          - { name: str_cta_heading, widget: string, label: "CTA — heading" }
          - { name: str_cta_body, widget: string, label: "CTA — body" }
          - { name: str_cta_primary_label, widget: string, label: "CTA — primary button label" }
          - { name: str_contact_hero_headline, widget: string, label: "Contact hero — headline" }
